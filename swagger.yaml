openapi: 3.0.0
info:
  title: Sabr Shukr Backend API
  version: 1.0.0
  description: API documentation for the SabrShukr e-commerce platform backend.
servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: https://sabrshukrbackend.onrender.com/api
    description: Production server

tags:
  - name: Auth
    description: User authentication and authorization
  - name: Homepage
    description: Aggregated content for the homepage
  - name: Products & Categories
    description: Product and Category related operations
  - name: User Profile & Addresses
    description: User profile and shipping address management
  - name: Wishlist
    description: User wishlist management
  - name: Cart
    description: User shopping cart management
  - name: Orders
    description: Order history and management
  - name: Reviews & Ratings
    description: Product reviews and ratings management
  - name: Payment APIs
    description: Payment gateway integration endpoints
  - name: Admin APIs
    description: Admin panel management operations (requires admin role)
  - name: Admin User Management
    description: Management of user accounts by administrators
  - name: Admin Order Management
    description: Management of customer orders by administrators
  - name: Admin Review Management
    description: Management of product reviews by administrators
  - name: Admin Homepage Content Management
    description: Management of homepage banners and Watch & Shop videos
  - name: Affiliate APIs
    description: Affiliate program management endpoints
  - name: Coupon APIs
    description: Coupon management and application endpoints
  - name: Notifications
    description: User notification management
  - name: Referral APIs
    description: Referral program management endpoints
  - name: Deal of the Day
    description: Deal of the Day feature endpoints
  - name: Products
    description: Product-related operations
  - name: Delhivery
    description: Delhivery shipping integration endpoints
  - name: Delhivery
    description: Delhivery shipping integration endpoints


paths:
  /api/reviews:
    post:
      summary: Create a product review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - user hasn't purchased product
  /api/reviews/{id}:
    put:
      summary: Update an existing review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdate'
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - user hasn't purchased product
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWithReferralRequest'
      responses:
        '201':
          description: User successfully registered
        '400':
          description: Invalid input
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: strongpassword123
      responses:
        '200':
          description: User successfully logged in
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logs out the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully logged out
        '401':
          description: Unauthorized
  /auth/verify-token:
    get:
      tags:
        - Auth
      summary: Verifies if the provided Bearer token is valid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Supabase auth user payload
        '401':
          description: Invalid or expired token / No token provided
        '500':
          description: Internal Server Error
  /auth/social-login:
    post:
      tags:
        - Auth
      summary: Initiates a social login flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [google, facebook]
                  example: google
      responses:
        '200':
          description: Social login initiated. Returns a redirect URL.
        '400':
          description: Invalid provider
  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Refreshes an access token using a valid refresh token
      parameters:
        - in: header
          name: X-Refresh-Token
          required: false
          schema:
            type: string
          description: Optional. Provide refresh token via header instead of body. If provided, body is not required.
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
            example: Bearer <refreshToken>
          description: Optional. You can also pass the refresh token as a Bearer token in the Authorization header for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Successfully refreshed session
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: The new session and tokens payload from Supabase
        '400':
          description: Missing refreshToken
        '401':
          description: Invalid or expired refresh token
        '500':
          description: Internal Server Error
  /homepage:
    get:
      tags:
        - Homepage
      summary: Fetches all aggregated content needed to render the main homepage
      responses:
        '200':
          description: Successfully fetched homepage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      banners:
                        type: array
                        items:
                          type: object # Define banner schema if needed
                      watchAndShopVideos:
                        type: array
                        items:
                          type: object # Define video schema if needed
                      featuredProducts:
                        type: array
                        items:
                          type: object # Define product schema if needed
                      parentCategories:
                        type: array
                        items:
                          type: object # Define category schema if needed
        '500':
          description: Internal Server Error
  /products:
    get:
      tags:
        - Products & Categories
      summary: Lists all published products with filtering and pagination
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter products by category ID
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - price
              - created_at
              - bestselling
              - rating_desc
          description: Sorting field. Omit both sortBy and order for Featured sorting.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction (required when sortBy=price or sortBy=created_at)
        - in: query
          name: page
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - in: query
          name: minPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Minimum price for filtering
        - in: query
          name: maxPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Maximum price for filtering
      responses:
        '200':
          description: Successfully retrieved products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Detailed product schema can go here later
        '400':
          description: Invalid query parameters
        '500':
          description: Internal Server Error
  /products/{id}:
    get:
      tags:
        - Products & Categories
      summary: Get details of a single published product, including its variants and reviews
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to retrieve
      responses:
        '200':
          description: Successfully retrieved product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductWithVariants' # Use new schema
        '404':
          description: Product not found or not published
        '500':
          description: Internal Server Error
  /products/search:
    get:
      tags:
        - Products & Categories
      summary: Searches for products based on a query string
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: true
          description: Search query string (e.g., product name, description, brand)
      responses:
        '200':
          description: A list of products matching the search query.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /categories:
    get:
      tags:
        - Products & Categories
      summary: Lists all active categories and their sub-categories
      responses:
        '200':
          description: Successfully retrieved categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Category schema with sub_categories
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets the profile of the currently logged-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object # User profile schema
        '401':
          description: Unauthorized
  /auth/check-phone-exists:
    post:
      tags:
        - Auth
      summary: Checks if a phone number is already registered in Supabase auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+919876543210"
      responses:
        '200':
          description: Phone existence check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  exists:
                    type: boolean
        '400':
          description: Missing or invalid input
        '500':
          description: Internal Server Error
    put:
      tags:
        - User Profile & Addresses
      summary: Updates the profile of the currently logged-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Jane Doe
                profilePictureUrl:
                  type: string
                  format: uri
                  example: https://example.com/profile.jpg
                dateOfBirth:
                  type: string
                  format: date
                  example: 1990-05-21
      responses:
        '200':
          description: User profile updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: User profile not found
        '500':
          description: Internal Server Error
  /user/addresses:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets all saved addresses for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Address schema
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      tags:
        - User Profile & Addresses
      summary: Adds a new shipping address for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddressRequest'
      responses:
        '201':
          description: Address added successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /user/addresses/{id}:
    put:
      tags:
        - User Profile & Addresses
      summary: Updates a specific shipping address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the address to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateAddressRequest'
      responses:
        '200':
          description: Address updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Address not found or does not belong to user
        '500':
          description: Internal Server Error
    delete:
      tags:
        - User Profile & Addresses
      summary: Deletes a specific shipping address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the address to delete
      responses:
        '200':
          description: Address deleted successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Address deleted successfully.
        '401':
          description: Unauthorized
        '404':
          description: Address not found or does not belong to user
        '500':
          description: Internal Server Error
  /user/wishlist:
    get:
      tags:
        - Wishlist
      summary: Gets all items in the user's wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Wishlist item schema (product details)
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      tags:
        - Wishlist
      summary: Adds a product to the user's wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
      responses:
        '201':
          description: Product added to wishlist successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '409':
          description: Product already in wishlist
        '500':
          description: Internal Server Error
  /user/wishlist/{productId}:
    delete:
      tags:
        - Wishlist
      summary: Removes a product from the user's wishlist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the product to remove from wishlist
      responses:
        '200':
          description: Product removed from wishlist successfully
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /user/wishlistedByUser:
    get:
      tags:
        - Wishlist
      summary: Get all product IDs wishlisted by the user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved wishlisted product IDs
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/WishlistedProductIds'
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart:
    get:
      tags:
        - Cart
      summary: Gets all items in the user's cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved cart items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Cart item schema (product details and quantity)
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart/add:
    post:
      tags:
        - Cart
      summary: Adds a single product variant to the user\'s cart or updates quantity
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - variantId
                - quantity
              properties:
                variantId:
                  type: integer
                  description: The ID of the product variant.
                  example: 101
                quantity:
                  type: integer
                  minimum: 1
                  description: The quantity of the product variant.
                  example: 1
      responses:
        '200':
          description: Successfully added or updated the cart item
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: The updated cart item data if successful.
        '400':
          description: Invalid input or insufficient stock
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart/update:
    put:
      tags:
        - Cart
      summary: Updates the quantity of a specific item in the cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
                quantity:
                  type: integer
                  format: int32
                  minimum: 0 # Allows setting quantity to 0 to remove item
                  example: 3
      responses:
        '200':
          description: Cart item quantity updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Cart item not found
        '500':
          description: Internal Server Error
  /cart/remove/{productId}:
    delete:
      tags:
        - Cart
      summary: Removes an item completely from the cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the product to remove from cart
      responses:
        '200':
          description: Product removed from cart successfully
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /orders:
    post:
      tags:
        - Orders
      summary: Places a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - shippingAddressId
                - paymentMethod
              properties:
                shippingAddressId:
                  type: integer
                  format: int64
                  example: 1
                paymentMethod:
                  type: string
                  enum: [COD, Online]
                  description: Method of payment for the order (Cash On Delivery or Online Payment).
                  example: COD
                discountAmount:
                  type: number
                  format: float
                  description: Optional discount amount computed on the client (will be sanitized and stored as orders.discount_amount)
                  example: 150.00
                applyGiftWrap:
                  type: boolean
                  description: If true, applies a fixed gift wrap fee of 30 and marks the order as gift wrapped.
                  example: true
                giftDetails:
                  type: object
                  description: Optional gifting details; if provided and applyGiftWrap is true, they will be stored with the order.
                  properties:
                    recipientName:
                      type: string
                      example: Jane Doe
                    message:
                      type: string
                      example: Happy Birthday! Hope you have a wonderful day.
                    senderName:
                      type: string
                      example: John
            example:
              shippingAddressId: 1
              paymentMethod: COD
              discountAmount: 150.0
              applyGiftWrap: true
              giftDetails:
                recipientName: Jane Doe
                message: Happy Birthday! Hope you have a wonderful day.
                senderName: John
      responses:
        '201':
          description: Order placed successfully
        '400':
          description: Invalid input or empty cart
        '401':
          description: Unauthorized
        '404':
          description: Shipping address not found
        '500':
          description: Internal Server Error
    get:
      tags:
        - Orders
      summary: Gets the order history for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved order history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Order history schema with order items and product details
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Gets the details of a single order, including order items
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the order to retrieve
      responses:
        '200':
          description: Successfully retrieved order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object # Single order schema with detailed order items
        '401':
          description: Unauthorized
        '404':
          description: Order not found or does not belong to user
        '500':
          description: Internal Server Error
  /reviews:
    post:
      tags:
        - Reviews & Ratings
      summary: Submits a review for a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: Excellent product, highly recommend!
                images:
                  type: array
                  description: Optional image URLs to attach to the review (max 10)
                  items:
                    type: string
                    format: uri
                  example:
                    - https://cdn.example.com/reviews/img1.jpg
                    - https://cdn.example.com/reviews/img2.jpg
                videos:
                  type: array
                  description: Optional video URLs to attach to the review (max 10)
                  items:
                    type: string
                    format: uri
                  example:
                    - https://cdn.example.com/reviews/clip1.mp4
            example:
              productId: 123
              rating: 5
              comment: Excellent product, highly recommend!
              images:
                - https://cdn.example.com/reviews/img1.jpg
                - https://cdn.example.com/reviews/img2.jpg
              videos:
                - https://cdn.example.com/reviews/clip1.mp4
      responses:
        '201':
          description: Review submitted successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: User has not purchased this product or already reviewed it'
        '409':
          description: Conflict - User has already reviewed this product
        '500':
          description: Internal Server Error
  /payment/initiate:
    post:
      tags:
        - Payment APIs
      summary: Initiates a payment process with the payment gateway for a given order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: integer
                  format: int64
                  example: 456
      responses:
        '200':
          description: Payment order/intent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  order:
                    type: object # Razorpay order details
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Order not found
        '500':
          description: Internal Server Error
  /payment/webhook:
    post:
      tags:
        - Payment APIs
      summary: Receives payment status updates from the payment gateway
      description: This endpoint is called by the payment gateway (e.g., Razorpay) to notify of payment status updates. It requires webhook signature verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object # Webhook payload structure varies by gateway
              example:
                event: payment.captured
                payload:
                  payment:
                    entity:
                      id: pay_xxxxxxxxxxxxxx
                      amount: 50000
                      currency: INR
                      status: captured
                      notes:
                        order_id: 456
      responses:
        '200':
          description: Webhook received and processed successfully
        '403':
          description: 'Invalid signature'
        '500':
          description: Internal Server Error
  /payment/verify:
    post:
      tags:
        - Payment APIs
      summary: Verifies a payment after checkout
      description: >-
        Called by the client immediately after Razorpay Checkout succeeds. The backend
        validates the Razorpay signature, updates the order status to `paid`, inserts
        a payment record, and returns a success boolean.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                razorpay_order_id:
                  type: string
                  description: Razorpay order ID returned by /payment/initiate.
                  example: order_9A33XWu170gUtm
                razorpay_payment_id:
                  type: string
                  description: Razorpay payment ID returned in the Checkout handler.
                  example: pay_29QQoUBi66xm2f
                razorpay_signature:
                  type: string
                  description: HMAC signature provided by Razorpay Checkout.
                  example: 5d545bdbf86d34c317e3bd0982d537ce1e2c8cd1dd904449e4be86fcd4a44ab
                orderId:
                  type: integer
                  description: Internal order id in your database.
                  example: 456
              required:
                - razorpay_order_id
                - razorpay_payment_id
                - razorpay_signature
                - orderId
            example:
              razorpay_order_id: order_9A33XWu170gUtm
              razorpay_payment_id: pay_29QQoUBi66xm2f
              razorpay_signature: 5d545bdbf86d34c317e3bd0982d537ce1e2c8cd1dd904449e4be86fcd4a44ab
              orderId: 456
      responses:
        '200':
          description: Payment verified successfully
        '400':
          description: Invalid signature or missing parameters
        '404':
          description: Order not found
        '500':
          description: Internal Server Error

