                      sku: { type: string }
                      name: { type: string }
                      units: { type: integer }
                      selling_price: { type: number }
                      discount: { type: number }
                      qc_enable: { type: boolean }
                      hsn: { type: string }
                      brand: { type: string }
                      qc_size: { type: string }
                payment_method: { type: string, enum: [PREPAID, COD] }
                total_discount: { type: number }
                sub_total: { type: number }
                length: { type: number }
                breadth: { type: number }
                height: { type: number }
                weight: { type: number }
      responses:
