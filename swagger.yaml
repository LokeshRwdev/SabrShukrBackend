                shipping_country: { type: string }
                shipping_pincode: { type: integer }
                shipping_state: { type: string }
                shipping_email: { type: string, format: email }
                shipping_isd_code: { type: string }
                shipping_phone: { type: string }
                order_items:
                  type: array
                  items:
                    type: object
                    properties:
                      sku: { type: string }
                      name: { type: string }
                      units: { type: integer }
                      selling_price: { type: number }
                      discount: { type: number }
                      qc_enable: { type: boolean }
                      hsn: { type: string }
                      brand: { type: string }
                      qc_size: { type: string }
                payment_method: { type: string, enum: [PREPAID, COD] }
                total_discount: { type: number }
                sub_total: { type: number }
                length: { type: number }
                breadth: { type: number }
                height: { type: number }
                weight: { type: number }
      responses:
        '200':
          description: Return order created successfully
        '400':
          description: Invalid request or return window expired
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: Admin access required'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/shipping/generate-awb:
    post:
      tags: [Admin APIs, Shipping]
      summary: Generate AWB and schedule pickup
      description: Generates AWB for the order's shipment and schedules pickup automatically. Requires an existing `shipment_id` on the order.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: integer
                  description: Internal order ID
                  example: 123
                courierId:
                  type: integer
                  description: Optional Shiprocket courier ID to force assign
                  example: 2
                pickupDate:
                  type: string
                  description: Optional pickup date in YYYY-MM-DD format; defaults to next day
                  example: '2025-08-14'
              required:
                - orderId
      responses:
        '200':
          description: AWB generated and pickup scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
        '400':
          description: Bad Request (shipment_id missing or invalid input)
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: Admin access required'
        '500':
          $ref: '#/components/responses/ServerError'
  /admin/shipping/generate-label:
    post:
      tags: [Admin APIs, Shipping]
      summary: Generate and fetch label URL for a shipment
      description: Generates label for the order's shipment and stores the label URL on the order record.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: integer
                  description: Internal order ID
                  example: 123
              required:
                - orderId
      responses:
        '200':
          description: Label generated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: object
                    properties:
                      label_url:
                        type: string
                        example: 'https://sr-cdn.example/labels/abc123.pdf'
        '400':
          description: Bad Request (shipment_id missing or invalid input)
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: Admin access required'
        '500':
          $ref: '#/components/responses/ServerError'
  /webhooks/shiprocket-tracking:
    post:

      tags: [Webhooks, Shipping]
      summary: Receives shipment tracking updates from Shiprocket
      description: Shiprocket calls this endpoint to notify shipment status changes. No authentication is required, but the payload is validated internally.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              example:
                shipment_id: 54321987
                current_status: DELIVERED
                awb: XYZ12345678
                courier: Delhivery
                eta: '2025-08-16'
      responses:
        '200':
          description: Webhook received and processed
        '500':
          $ref: '#/components/responses/ServerError'

  /create-delhivery-order:
    post:
      security: []  
      tags: [Delhivery]
      summary: Create Delhivery order
      description: >
        Creates shipment(s) in Delhivery. Validates pincode, phone, and dimensions.
        High-value shipments (total_amount > ₹50,000) require an e-waybill.
        Weight is normalized to kilograms on the server.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DelhiveryCreateOrderRequest'
      responses:
        '200':
          description: Order(s) created (at least one success)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DelhiveryCreateOrderResponse'
        '400':
          description: Validation error (e.g., missing mandatory fields, invalid pincode, missing e-waybill)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string, example: "Validation error" }
                  errors:
                    type: array
                    items: { type: string }
        '500':
          description: Delhivery API failure or server error
          content:
            application/json:
              schema:
                type: object
                properties:
                  success: { type: boolean, example: false }
                  message: { type: string, example: "Delhivery create order failed" }
                  error:
                    type: object
                    additionalProperties: true