openapi: 3.0.0
info:
  title: Sabr Shukr Backend API
  version: 1.0.0
  description: API documentation for the Sabr Shukr e-commerce platform backend.
servers:
  - url: http://localhost:5000/api
    description: Development server
  - url: https://sabrshukrbackend.onrender.com/api
    description: Production server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          type: string
        is_published:
          type: boolean
        is_featured:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        name: "Premium Yoga Mat"
        slug: "premium-yoga-mat"
        description: "A high-quality yoga mat for all levels."
        brand: "ZenFlow"
        is_published: true
        is_featured: false
        created_at: "2023-01-15T10:00:00Z"
        updated_at: "2023-01-15T10:00:00Z"

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the product variant.
        product_id:
          type: integer
          description: The ID of the parent product this variant belongs to.
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 29.99
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 100
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "YM-BLUE-S"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/yoga-mat-blue-small.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, size).
          example:
            color: "Blue"
            size: "Small"
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - product_id
        - price
        - stock_quantity
      example:
        id: 101
        product_id: 1
        price: 29.99
        stock_quantity: 100
        sku: "YM-BLUE-S"
        image_url: "https://example.com/images/yoga-mat-blue-small.jpg"
        attributes:
          color: "Blue"
          size: "Small"
        created_at: "2023-01-16T11:00:00Z"
        updated_at: "2023-01-16T11:00:00Z"

    ProductImage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: integer
        image_url:
          type: string
          format: uri
        is_thumbnail:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        product_id: 1
        image_url: "https://example.com/product_main.jpg"
        is_thumbnail: true
        created_at: "2023-01-01T12:00:00Z"

    Review:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: integer
        user_id:
          type: string # UUID or similar
        rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        product_id: 1
        user_id: "uuid-user-123"
        rating: 4.5
        comment: "Great product, highly recommend!"
        created_at: "2023-01-05T09:30:00Z"

    ProductWithVariants:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            product_images: # Assuming this is still linked for product-level images
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Review'
            product_variants: # This will contain the variants array
              type: array
              items:
                $ref: '#/components/schemas/ProductVariant'
          example:
            product_images:
              - id: 1
                product_id: 1
                image_url: "https://example.com/product_main.jpg"
                is_thumbnail: true
                created_at: "2023-01-01T12:00:00Z"
            reviews:
              - id: 1
                product_id: 1
                user_id: "uuid-user-123"
                rating: 4.5
                comment: "Great product, highly recommend!"
                created_at: "2023-01-05T09:30:00Z"
            product_variants:
              - id: 101
                product_id: 1
                price: 15.00
                stock_quantity: 50
                sku: "ABC-001"
                image_url: "https://example.com/variant_a.jpg"
                attributes:
                  color: "Red"
                  size: "S"
              - id: 102
                product_id: 1
                price: 20.00
                stock_quantity: 30
                sku: "ABC-002"
                image_url: "https://example.com/variant_b.jpg"
                attributes:
                  color: "Blue"
                  size: "M"

    CreateProductRequest:
      type: object
      required:
        - name
        - slug
        - description
        - brand
        - isPublished
        - variants
      properties:
        name:
          type: string
          description: Name of the product.
          example: "New Yoga Mat"
        slug:
          type: string
          description: URL-friendly slug for the product.
          example: "new-yoga-mat"
        description:
          type: string
          description: Detailed description of the product.
          example: "A durable and eco-friendly yoga mat."
        brand:
          type: string
          description: Brand of the product.
          example: "EcoYoga"
        isPublished:
          type: boolean
          description: Whether the product is visible to customers.
          example: true
        isFeatured:
          type: boolean
          description: Whether the product should be featured on the homepage.
          example: false
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          description: URLs of main product images.
          example: ["https://example.com/img1.jpg", "https://example.com/img2.jpg"]
        categoryIds:
          type: array
          items:
            type: integer
          description: Array of category IDs the product belongs to.
          example: [1, 5]
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantInput'
          minItems: 1
          description: An array of product variants for this product.

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          type: string
        isPublished:
          type: boolean
        isFeatured:
          type: boolean
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        categoryIds:
          type: array
          items:
            type: integer
      example:
        name: "Updated Yoga Mat"
        description: "An even more durable and eco-friendly yoga mat."
        isPublished: true

    ProductVariantInput:
      type: object
      properties:
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 34.99
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 75
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "YM-GREEN-L"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/yoga-mat-green-large.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, size).
          example:
            color: "Green"
            size: "Large"
      required:
        - price
        - stock_quantity

    CreateProductVariantRequest:
      type: object
      required:
        - price
        - stock_quantity
      properties:
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 45.00
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 50
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "CUSHION-BLUE"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/cushion-blue.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, material).
          example:
            color: "Blue"
            material: "Cotton"

    UpdateProductVariantRequest:
      type: object
      properties:
        price:
          type: number
          format: float
          description: The new price of the variant.
          example: 48.00
        stock_quantity:
          type: integer
          description: The new stock quantity of the variant.
          example: 45
        sku:
          type: string
          nullable: true
          description: The new SKU for the variant.
          example: "CUSHION-BLUE-V2"
        image_url:
          type: string
          format: uri
          nullable: true
          description: The new image URL for the variant.
          example: "https://example.com/images/cushion-blue-v2.jpg"
        attributes:
          type: object
          nullable: true
          description: The new JSONB object for variant attributes.
          example:
            color: "Blue"
            material: "Organic Cotton"

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        full_name:
          type: string
        phone_number:
          type: string
          nullable: true
        profile_picture_url:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [user, admin]
          default: user
        is_blocked:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        email: "john.doe@example.com"
        full_name: "John Doe"
        phone_number: "+919876543210"
        profile_picture_url: "https://example.com/profiles/johndoe.jpg"
        role: "user"
        is_blocked: false
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: string
          format: uuid
        total_amount:
          type: number
          format: float
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          default: pending
        shipping_address_id:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        total_amount: 150.75
        status: "processing"
        shipping_address_id: 101
        created_at: "2023-03-10T14:30:00Z"
        updated_at: "2023-03-10T14:30:00Z"

    Banner:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        image_url: "https://example.com/banners/banner1.jpg"
        target_url: "https://example.com/sale"
        title: "Summer Sale!"
        subtitle: "Up to 50% off everything"
        order: 1
        is_active: true
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    CreateBannerRequest:
      type: object
      required:
        - image_url
        - order
      properties:
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
          default: true
      example:
        image_url: "https://example.com/banners/new_banner.jpg"
        target_url: "https://example.com/new-collection"
        title: "New Arrivals"
        subtitle: "Check out our latest products"
        order: 2
        is_active: true

    UpdateBannerRequest:
      type: object
      properties:
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
      example:
        image_url: "https://example.com/banners/updated_banner.jpg"
        title: "Updated Sale!"
        order: 1
        is_active: false

    WatchAndShopVideo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        title: "How to Style Your New Outfit"
        video_url: "https://www.youtube.com/watch?v=xxxxxxxx"
        description: "A guide to styling our latest collection."
        product_links:
          - product_id: 101
            timestamp: "00:15"
          - product_id: 102
            timestamp: "00:45"
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    CreateWatchAndShopVideoRequest:
      type: object
      required:
        - title
        - video_url
      properties:
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
      example:
        title: "New Product Showcase"
        video_url: "https://www.youtube.com/watch?v=yyyyyyyy"
        description: "Introducing our innovative new product."
        product_links:
          - product_id: 201
            timestamp: "01:00"

    UpdateWatchAndShopVideoRequest:
      type: object
      properties:
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
      example:
        title: "Updated Styling Guide"
        video_url: "https://www.youtube.com/watch?v=zzzzzzzz"
        description: "Revised tips for styling your favorite pieces."
        product_links:
          - product_id: 101
            timestamp: "00:20"

    Affiliate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          description: The user ID associated with this affiliate.
        referral_code:
          type: string
          description: Unique code for affiliate referrals.
        commission_rate:
          type: number
          format: float
          description: Commission rate for the affiliate (e.g., 0.10 for 10%).
        total_earnings:
          type: number
          format: float
          readOnly: true
          description: Total earnings accumulated by the affiliate.
        paid_earnings:
          type: number
          format: float
          readOnly: true
          description: Total earnings already paid out to the affiliate.
        pending_payout:
          type: number
          format: float
          readOnly: true
          description: Earnings pending payout to the affiliate.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: "affiliate-id-123"
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        referral_code: "AFFILIATE123"
        commission_rate: 0.10
        total_earnings: 500.75
        paid_earnings: 300.00
        pending_payout: 200.75
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    Coupon:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          description: The coupon code.
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          description: Type of discount (percentage or fixed amount).
        discount_value:
          type: number
          format: float
          description: The value of the discount (e.g., 0.15 for 15% or 10.00 for $10).
        minimum_order_amount:
          type: number
          format: float
          nullable: true
          description: Minimum order amount required to apply the coupon.
        valid_from:
          type: string
          format: date-time
          description: Date and time from which the coupon is valid.
        valid_until:
          type: string
          format: date-time
          description: Date and time until which the coupon is valid.
        usage_limit:
          type: integer
          nullable: true
          description: Maximum number of times the coupon can be used overall.
        used_count:
          type: integer
          readOnly: true
          description: Number of times the coupon has been used.
        is_active:
          type: boolean
          description: Whether the coupon is currently active.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        code: "SUMMER20"
        discount_type: "percentage"
        discount_value: 0.20
        minimum_order_amount: 50.00
        valid_from: "2023-06-01T00:00:00Z"
        valid_until: "2023-08-31T23:59:59Z"
        usage_limit: 1000
        used_count: 150
        is_active: true
        created_at: "2023-05-20T10:00:00Z"
        updated_at: "2023-05-20T10:00:00Z"

    ApplyCouponRequest:
      type: object
      required:
        - code
        - userId
        - orderId
        - orderTotal
      properties:
        code:
          type: string
          description: The coupon code to apply.
          example: "DISCOUNT10"
        userId:
          type: string
          format: uuid
          description: The ID of the user applying the coupon.
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        orderId:
          type: integer
          description: The ID of the order to which the coupon is being applied.
          example: 123
        orderTotal:
          type: number
          format: float
          description: The total amount of the order before discount.
          example: 150.00

    CouponApplicationResponse:
      type: object
      properties:
        discountAmount:
          type: number
          format: float
          description: The amount discounted by the coupon.
          example: 15.00
        newTotalAmount:
          type: number
          format: float
          description: The new total amount after applying the discount.
          example: 135.00
        couponId:
          type: integer
          description: The ID of the applied coupon.
          example: 1

    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: string
          format: uuid
          description: The ID of the user to whom the notification is sent.
        title:
          type: string
          description: Title of the notification.
        message:
          type: string
          description: Full message content of the notification.
        link_to:
          type: string
          format: uri
          nullable: true
          description: Optional URL the notification links to.
        is_read:
          type: boolean
          default: false
          description: Whether the user has read the notification.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        title: "Order Shipped!"
        message: "Your order #12345 has been shipped and is on its way."
        link_to: "https://example.com/orders/12345"
        is_read: false
        created_at: "2023-07-20T14:00:00Z"
        updated_at: "2023-07-20T14:00:00Z"

    CreateNotificationRequest:
      type: object
      required:
        - userId
        - title
        - message
      properties:
        userId:
          type: string
          format: uuid
          description: The ID of the user to whom the notification is sent.
          example: "a1b2c3d4-e5f6-7890-1234-5677890abcdef"
        title:
          type: string
          description: Title of the notification.
          example: "Special Offer!"
        message:
          type: string
          description: Full message content of the notification.
          example: "Get 20% off your next purchase with code SAVE20."
        link_to:
          type: string
          format: uri
          nullable: true
          description: Optional URL the notification links to.
          example: "https://example.com/offers"

    Referral:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        referrer_user_id:
          type: string
          format: uuid
          description: The user ID of the referrer.
        referred_user_id:
          type: string
          format: uuid
          description: The user ID of the referred user.
        referral_code_used:
          type: string
          description: The referral code that was used.
        status:
          type: string
          enum: [pending, completed, cancelled]
          default: pending
          description: Status of the referral (e.g., pending, completed).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        referrer_user_id: "uuid-referrer-123"
        referred_user_id: "uuid-referred-456"
        referral_code_used: "REFERRALXYZ"
        status: "pending"
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    RegisterWithReferralRequest:
      type: object
      required:
        - email
        - password
        - fullName
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: strongpassword123
        fullName:
          type: string
          example: John Doe
        referralCode:
          type: string
          description: Optional referral code used during registration.
          example: "FREESHIP"

    otpLoginRequest:
      type: object
      required:
        - phone
        - otp
      properties:
        phone:
          type: string
          description: Phone number in E.164 format (e.g., +919876543210)
          example: "+919876543210"
        otp:
          type: string
          description: The OTP code sent to the user's phone
          example: "123456"

    sendOtpRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          description: Phone number in E.164 format (e.g., +919876543210)
          example: "+919876543210"

tags:
  - name: Auth
    description: User authentication and authorization
  - name: Homepage
    description: Aggregated content for the homepage
  - name: Products & Categories
    description: Product and Category related operations
  - name: User Profile & Addresses
    description: User profile and shipping address management
  - name: Wishlist
    description: User wishlist management
  - name: Cart
    description: User shopping cart management
  - name: Orders
    description: Order history and management
  - name: Reviews & Ratings
    description: Product reviews and ratings management
  - name: Payment APIs
    description: Payment gateway integration endpoints
  - name: Admin APIs
    description: Admin panel management operations (requires admin role)
  - name: Admin User Management
    description: Management of user accounts by administrators
  - name: Admin Order Management
    description: Management of customer orders by administrators
  - name: Admin Review Management
    description: Management of product reviews by administrators
  - name: Admin Homepage Content Management
    description: Management of homepage banners and Watch & Shop videos
  - name: Affiliate APIs
    description: Affiliate program management endpoints
  - name: Coupon APIs
    description: Coupon management and application endpoints
  - name: Notifications
    description: User notification management
  - name: Referral APIs
    description: Referral program management endpoints
paths:
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWithReferralRequest'
      responses:
        '201':
          description: User successfully registered
        '400':
          description: Invalid input
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: strongpassword123
      responses:
        '200':
          description: User successfully logged in
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logs out the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully logged out
        '401':
          description: Unauthorized
  /auth/social-login:
    post:
      tags:
        - Auth
      summary: Initiates a social login flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [google, facebook]
                  example: google
      responses:
        '200':
          description: Social login initiated. Returns a redirect URL.
        '400':
          description: Invalid provider
  /homepage:
    get:
      tags:
        - Homepage
      summary: Fetches all aggregated content needed to render the main homepage
      responses:
        '200':
          description: Successfully fetched homepage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      banners:
                        type: array
                        items:
                          type: object # Define banner schema if needed
                      watchAndShopVideos:
                        type: array
                        items:
                          type: object # Define video schema if needed
                      featuredProducts:
                        type: array
                        items:
                          type: object # Define product schema if needed
                      parentCategories:
                        type: array
                        items:
                          type: object # Define category schema if needed
        '500':
          description: Internal Server Error
  /products:
    get:
      tags:
        - Products & Categories
      summary: Lists all published products with filtering and pagination
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter products by category ID
        - in: query
          name: brand
          schema:
            type: string
          description: Filter products by brand
        - in: query
          name: sortBy
          schema:
            type: string
            enum: [price, name, created_at]
          description: Field to sort by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
        - in: query
          name: page
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - in: query
          name: minPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Minimum price for filtering
        - in: query
          name: maxPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Maximum price for filtering
      responses:
        '200':
          description: Successfully retrieved products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Detailed product schema can go here later
        '400':
          description: Invalid query parameters
        '500':
          description: Internal Server Error
  /products/{id}:
    get:
      tags:
        - Products & Categories
      summary: Get details of a single published product, including its variants and reviews
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to retrieve
      responses:
        '200':
          description: Successfully retrieved product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductWithVariants' # Use new schema
        '404':
          description: Product not found or not published
        '500':
          description: Internal Server Error
  /products/search:
    get:
      tags:
        - Products & Categories
      summary: Searches for products based on a query string
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: true
          description: Search query string (e.g., product name, description, brand)
      responses:
        '200':
          description: Successfully retrieved search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Product search result schema
        '400':
          description: Search query parameter (q) is required
        '500':
          description: Internal Server Error
  /categories:
    get:
      tags:
        - Products & Categories
      summary: Lists all active categories and their sub-categories
      responses:
        '200':
          description: Successfully retrieved categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Category schema with sub_categories
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets the profile of the currently logged-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object # User profile schema
        '401':
          description: Unauthorized
        '404':
          description: User profile not found
        '500':
          description: Internal Server Error
    put:
      tags:
        - User Profile & Addresses
      summary: Updates the profile of the currently logged-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Jane Doe
                profilePictureUrl:
                  type: string
                  format: uri
                  example: https://example.com/profile.jpg
      responses:
        '200':
          description: User profile updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: User profile not found
        '500':
          description: Internal Server Error
  /user/addresses:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets all saved addresses for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user addresses
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Address schema
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      tags:
        - User Profile & Addresses
      summary: Adds a new shipping address for the current user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressLine1:
                  type: string
                  example: 123 Main St
                addressLine2:
                  type: string
                  example: Apt 4B
                city:
                  type: string
                  example: Someville
                state:
                  type: string
                  example: StateName
                pincode:
                  type: string
                  example: "123456"
                country:
                  type: string
                  example: India
                isDefault:
                  type: boolean
                  example: true
      responses:
        '201':
          description: Address added successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /user/addresses/{id}:
    put:
      tags:
        - User Profile & Addresses
      summary: Updates a specific shipping address
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the address to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                addressLine1:
                  type: string
                  example: 123 New St
                addressLine2:
                  type: string
                  example: Suite 1A
                city:
                  type: string
                  example: Another Town
                state:
                  type: string
                  example: NewState
                pincode:
                  type: string
                  example: "654321"
                country:
                  type: string
                  example: India
                isDefault:
                  type: boolean
                  example: false
      responses:
        '200':
          description: Address updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Address not found or does not belong to user
        '500':
          description: Internal Server Error
  /user/wishlist:
    get:
      tags:
        - Wishlist
      summary: Gets all items in the user's wishlist
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved wishlist items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Wishlist item schema (product details)
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
    post:
      tags:
        - Wishlist
      summary: Adds a product to the user's wishlist
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
      responses:
        '201':
          description: Product added to wishlist successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '409':
          description: Product already in wishlist
        '500':
          description: Internal Server Error
  /user/wishlist/{productId}:
    delete:
      tags:
        - Wishlist
      summary: Removes a product from the user's wishlist
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the product to remove from wishlist
      responses:
        '200':
          description: Product removed from wishlist successfully
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart:
    get:
      tags:
        - Cart
      summary: Gets all items in the user's cart
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved cart items
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Cart item schema (product details and quantity)
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart/add:
    post:
      tags:
        - Cart
      summary: Adds a specific product variant to the user's cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - variantId
                - quantity
              properties:
                variantId:
                  type: integer
                  description: The ID of the product variant to add to the cart.
                  example: 101
                quantity:
                  type: integer
                  minimum: 1
                  default: 1
                  description: The quantity of the product variant to add.
                  example: 1
      responses:
        '201':
          description: Item successfully added/updated in cart
        '400':
          description: Invalid input or insufficient stock
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /cart/update:
    put:
      tags:
        - Cart
      summary: Updates the quantity of a specific item in the cart
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
                quantity:
                  type: integer
                  format: int32
                  minimum: 0 # Allows setting quantity to 0 to remove item
                  example: 3
      responses:
        '200':
          description: Cart item quantity updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Cart item not found
        '500':
          description: Internal Server Error
  /cart/remove/{productId}:
    delete:
      tags:
        - Cart
      summary: Removes an item completely from the cart
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the product to remove from cart
      responses:
        '200':
          description: Product removed from cart successfully
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /orders:
    post:
      tags:
        - Orders
      summary: Places a new order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                shippingAddressId:
                  type: integer
                  format: int64
                  example: 1
      responses:
        '201':
          description: Order placed successfully
        '400':
          description: Invalid input or empty cart
        '401':
          description: Unauthorized
        '404':
          description: Shipping address not found
        '500':
          description: Internal Server Error
    get:
      tags:
        - Orders
      summary: Gets the order history for the current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved order history
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Order history schema with order items and product details
        '401':
          description: Unauthorized
        '500':
          description: Internal Server Error
  /orders/{id}:
    get:
      tags:
        - Orders
      summary: Gets the details of a single order, including order items
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            format: int64
          required: true
          description: ID of the order to retrieve
      responses:
        '200':
          description: Successfully retrieved order details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object # Single order schema with detailed order items
        '401':
          description: Unauthorized
        '404':
          description: Order not found or does not belong to user
        '500':
          description: Internal Server Error
  /reviews:
    post:
      tags:
        - Reviews & Ratings
      summary: Submits a review for a product
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                productId:
                  type: integer
                  format: int64
                  example: 123
                rating:
                  type: integer
                  minimum: 1
                  maximum: 5
                  example: 5
                comment:
                  type: string
                  example: Excellent product, highly recommend!
      responses:
        '201':
          description: Review submitted successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: User has not purchased this product or already reviewed it'
        '409':
          description: Conflict - User has already reviewed this product
        '500':
          description: Internal Server Error
  /payment/initiate:
    post:
      tags:
        - Payment APIs
      summary: Initiates a payment process with the payment gateway for a given order
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                orderId:
                  type: integer
                  format: int64
                  example: 456
      responses:
        '200':
          description: Payment order/intent created successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  order:
                    type: object # Razorpay order details
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: Order not found
        '500':
          description: Internal Server Error
  /payment/webhook:
    post:
      tags:
        - Payment APIs
      summary: Receives payment status updates from the payment gateway
      description: This endpoint is called by the payment gateway (e.g., Razorpay) to notify of payment status updates. It requires webhook signature verification.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object # Webhook payload structure varies by gateway
              example:
                event: payment.captured
                payload:
                  payment:
                    entity:
                      id: pay_xxxxxxxxxxxxxx
                      amount: 50000
                      currency: INR
                      status: captured
                      notes:
                        order_id: 456
      responses:
        '200':
          description: Webhook received and processed successfully
        '403':
          description: 'Invalid signature'
        '500':
          description: Internal Server Error
  /admin/dashboard:
    get:
      tags:
        - Admin APIs
      summary: Fetches aggregated analytics for the admin dashboard
      description: Requires an authenticated user with 'admin' role.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved dashboard statistics
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      totalSales:
                        type: number
                        format: float
                        example: 123456.78
                      newUsers:
                        type: integer
                        example: 50
                      recentOrders:
                        type: array
                        items:
                          type: object # Simplified order object for dashboard
        '401':
          description: Unauthorized
        '403':
          description: 'Forbidden: Admin access required'
        '500':
          description: Internal Server Error
  /admin/products:
    post:
      tags:
        - Admin APIs
      summary: Create a new product with initial variants
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductRequest'
      responses:
        '201':
          description: Product and its variants successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductWithVariants'
        '400':
          description: Invalid input (e.g., missing variants)
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '500':
          description: Internal Server Error
    put:
      tags:
        - Admin APIs
      summary: Update an existing product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to update
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProductRequest'
      responses:
        '200':
          description: Product successfully updated
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: Product not found
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Admin APIs
      summary: Delete a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to delete
      responses:
        '200':
          description: Product successfully deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Product successfully deleted.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: Product not found
        '500':
          description: Internal Server Error
  /admin/products/{id}/feature:
    put:
      tags:
        - Admin APIs
      summary: Feature a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to feature
      responses:
        '200':
          description: Product successfully featured
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message: 
                    type: string
                    example: Product successfully featured.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: Product not found
        '500':
          description: Internal Server Error
    delete:
      tags:
        - Admin APIs
      summary: Unfeature a product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to unfeature
      responses:
        '200':
          description: Product successfully unfeatured
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  message:
                    type: string
                    example: Product successfully unfeatured.
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: Product not found
        '500':
          description: Internal Server Error
  /admin/products/{productId}/variants:
    post:
      tags:
        - Admin APIs
      summary: Add a new variant to an existing product
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to add a variant to
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProductVariantRequest'
      responses:
        '201':
          description: Product variant successfully created
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductVariant'
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '403':
          description: Forbidden (Admin role required)
        '404':
          description: Product not found
        '500':
          description: Internal Server Error
  /admin/products/{productId}/variants/{variantId}:
    put:
      tags:
        - Admin APIs
      summary: Update a specific product variant
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: productId
          schema:
            type: integer
          required: true
          description: Numeric ID of the parent product
        - in: path
          name: variantId
          schema:
            type: integer
          required: true
