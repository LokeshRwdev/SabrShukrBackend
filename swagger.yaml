  /admin/shipping/check-rates:
    post:
      tags: [Admin APIs, Shipping]
      summary: Check serviceability and rates for a shipment via Shiprocket
      description: Checks if delivery is available between the configured pickup postcode and the provided delivery pincode and returns available courier options with rates.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
