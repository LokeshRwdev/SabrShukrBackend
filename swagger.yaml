openapi: 3.0.0
info:
  title: Sabr Shukr Backend API
  version: 1.0.0
  description: API documentation for the Sabr Shukr e-commerce platform backend.
servers:
  - url: http://localhost:8080/api
    description: Development server
  - url: http://13.235.104.116:8080/api
    description: Production server
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    Product:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          type: string
        is_published:
          type: boolean
        is_featured:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        name: "Premium Yoga Mat"
  /cart/merge:
    post:
      tags:
        - Cart
      summary: Merge a guest cart into the authenticated user's cart
      description: >
        Accepts the full guest cart in a single request and atomically merges it with
        the user's existing cart, summing quantities for duplicate variants.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CartMergeRequest'
      responses:
        '200':
          description: Cart merged successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  message:
                    type: string
                    example: Cart merged successfully.
        '400':
          description: Invalid cart data provided
        '401':
          description: Unauthorized
        '500':
          description: Could not merge cart due to server error
        slug: "premium-yoga-mat"
        description: "A high-quality yoga mat for all levels."
        brand: "ZenFlow"
        is_published: true
        is_featured: false
        created_at: "2023-01-15T10:00:00Z"
        updated_at: "2023-01-15T10:00:00Z"

    ProductVariant:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: Unique identifier for the product variant.
        product_id:
          type: integer
          description: The ID of the parent product this variant belongs to.
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 29.99
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 100
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "YM-BLUE-S"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/yoga-mat-blue-small.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, size).
          example:
            color: "Blue"
            size: "Small"
        discount_type:
          type: string
          nullable: true
          description: Type of discount applied to this variant (e.g., percentage or fixed amount).
          example: "percentage"
        discount_value:
          type: number
          format: float
          nullable: true
          description: Discount value. If percentage, treat as percent; otherwise treat as absolute amount.
          example: 10
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      required:
        - product_id
        - price
        - stock_quantity
      example:
        id: 101
        product_id: 1
        price: 29.99
        stock_quantity: 100
        sku: "YM-BLUE-S"
        image_url: "https://example.com/images/yoga-mat-blue-small.jpg"
        attributes:
          color: "Blue"
          size: "Small"
        discount_type: "percentage"
        discount_value: 10
        created_at: "2023-01-16T11:00:00Z"
        updated_at: "2023-01-16T11:00:00Z"

    ProductImage:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: integer
        image_url:
          type: string
          format: uri
        is_thumbnail:
          type: boolean
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        product_id: 1
        image_url: "https://example.com/product_main.jpg"
        is_thumbnail: true
        created_at: "2023-01-01T12:00:00Z"

    Review:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        product_id:
          type: integer
        user_id:
          type: string # UUID or similar
        rating:
          type: number
          format: float
          minimum: 1
          maximum: 5
        comment:
          type: string
          nullable: true
        images:
          type: array
          description: Optional image URLs attached to the review
          items:
            type: string
            format: uri
        videos:
          type: array
          description: Optional video URLs attached to the review
          items:
            type: string
            format: uri
        created_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        product_id: 1
        user_id: "uuid-user-123"
        rating: 4.5
        comment: "Great product, highly recommend!"
        images:
          - "https://cdn.example.com/reviews/img1.jpg"
          - "https://cdn.example.com/reviews/img2.jpg"
        videos:
          - "https://cdn.example.com/reviews/clip1.mp4"
        created_at: "2023-01-05T09:30:00Z"

    ProductWithVariants:
      allOf:
        - $ref: '#/components/schemas/Product'
        - type: object
          properties:
            product_images: # Assuming this is still linked for product-level images
              type: array
              items:
                $ref: '#/components/schemas/ProductImage'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Review'
            product_variants: # This will contain the variants array
              type: array
              items:
                $ref: '#/components/schemas/ProductVariant'
          example:
            product_images:
              - id: 1
                product_id: 1
                image_url: "https://example.com/product_main.jpg"
                is_thumbnail: true
                created_at: "2023-01-01T12:00:00Z"
            reviews:
              - id: 1
                product_id: 1
                user_id: "uuid-user-123"
                rating: 4.5
                comment: "Great product, highly recommend!"
                created_at: "2023-01-05T09:30:00Z"
            product_variants:
              - id: 101
                product_id: 1
                price: 15.00
                stock_quantity: 50
                sku: "ABC-001"
                image_url: "https://example.com/variant_a.jpg"
                attributes:
                  color: "Red"
                  size: "S"
                discount_type: "percentage"
                discount_value: 10
              - id: 102
                product_id: 1
                price: 20.00
                stock_quantity: 30
                sku: "ABC-002"
                image_url: "https://example.com/variant_b.jpg"
                attributes:
                  color: "Blue"
                  size: "M"
                discount_type: "fixed_amount"
                discount_value: 5

    CreateProductRequest:
      type: object
      required:
        - name
        - slug
        - description
        - brand
        - isPublished
        - variants
      properties:
        name:
          type: string
          description: Name of the product.
          example: "New Yoga Mat"
        slug:
          type: string
          description: URL-friendly slug for the product.
          example: "new-yoga-mat"
        description:
          type: string
          description: Detailed description of the product.
          example: "A durable and eco-friendly yoga mat."
        brand:
          type: string
          description: Brand of the product.
          example: "EcoYoga"
        isPublished:
          type: boolean
          description: Whether the product is visible to customers.
          example: true
        isFeatured:
          type: boolean
          description: Whether the product should be featured on the homepage.
          example: false
        imageUrls:
          type: array
          items:
            type: string
            format: uri
          description: URLs of main product images.
          example: ["https://example.com/img1.jpg", "https://example.com/img2.jpg"]
        categoryIds:
          type: array
          items:
            type: integer
          description: Array of category IDs the product belongs to.
          example: [1, 5]
        variants:
          type: array
          items:
            $ref: '#/components/schemas/ProductVariantInput'
          minItems: 1
          description: An array of product variants for this product.

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        brand:
          type: string
        isPublished:
          type: boolean
        isFeatured:
          type: boolean
        imageUrls:
          type: array
          items:
            type: string
            format: uri
        categoryIds:
          type: array
          items:
            type: integer
        variants:
          type: array
          description: Upsert variants. Include `id` to update existing; omit `id` to create new.
          items:
            $ref: '#/components/schemas/UpdateProductVariantInput'
        deletedVariantIds:
          type: array
          description: Variant IDs to delete from this product.
          items:
            type: integer
      example:
        name: "Updated Yoga Mat"
        description: "An even more durable and eco-friendly yoga mat."
        isPublished: true

    ProductVariantInput:
      type: object
      properties:
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 34.99
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 75
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "YM-GREEN-L"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/yoga-mat-green-large.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, size).
          example:
            color: "Green"
            size: "Large"
        discount_type:
          type: string
          nullable: true
          description: Type of discount applied to this variant (e.g., percentage or flat).
          example: "percentage"
        discount_value:
          type: number
          format: float
          nullable: true
          description: Discount value. If percentage, treat as percent; otherwise treat as absolute amount.
          example: 10
      required:
        - price
        - stock_quantity

    CreateProductVariantRequest:
      type: object
      required:
        - price
        - stock_quantity
      properties:
        price:
          type: number
          format: float
          description: The price of this specific variant.
          example: 45.00
        stock_quantity:
          type: integer
          description: The quantity of this variant in stock.
          example: 50
        sku:
          type: string
          nullable: true
          description: Stock Keeping Unit for this variant.
          example: "CUSHION-BLUE"
        image_url:
          type: string
          format: uri
          nullable: true
          description: URL to an image specific to this variant.
          example: "https://example.com/images/cushion-blue.jpg"
        attributes:
          type: object
          nullable: true
          description: JSONB object storing variant-specific attributes (e.g., color, material).
          example:
            color: "Blue"
            material: "Cotton"
        discount_type:
          type: string
          nullable: true
          description: Type of discount applied to this variant (e.g., percentage or flat).
          example: "percentage"
        discount_value:
          type: number
          format: float
          nullable: true
          description: Discount value. If percentage, treat as percent; otherwise treat as absolute amount.
          example: 10

    UpdateProductVariantRequest:
      type: object
      properties:
        price:
          type: number
          format: float
          description: The new price of the variant.
          example: 48.00
        stock_quantity:
          type: integer
          description: The new stock quantity of the variant.
          example: 45
        sku:
          type: string
          nullable: true
          description: The new SKU for the variant.
          example: "CUSHION-BLUE-V2"
        image_url:
          type: string
          format: uri
          nullable: true
          description: The new image URL for the variant.
          example: "https://example.com/images/cushion-blue-v2.jpg"
        attributes:
          type: object
          nullable: true
          description: The new JSONB object for variant attributes.
          example:
            color: "Blue"
            material: "Organic Cotton"
        discount_type:
          type: string
          nullable: true
          description: Type of discount applied to this variant (e.g., percentage or flat).
          example: "percentage"
        discount_value:
          type: number
          format: float
          nullable: true
          description: Discount value. If percentage, treat as percent; otherwise treat as absolute amount.
          example: 10

    UpdateProductVariantInput:
      type: object
      properties:
        id:
          type: integer
          description: Existing variant ID to update. Omit to create a new variant.
        price:
          type: number
          format: float
          example: 48
        stock_quantity:
          type: integer
          example: 45
        sku:
          type: string
          nullable: true
        image_url:
          type: string
          format: uri
          nullable: true
        attributes:
          type: object
          nullable: true
        discount_type:
          type: string
          nullable: true
        discount_value:
          type: number
          format: float
          nullable: true

    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        email:
          type: string
          format: email
        full_name:
          type: string
        phone_number:
          type: string
          nullable: true
        profile_picture_url:
          type: string
          format: uri
          nullable: true
        role:
          type: string
          enum: [user, admin]
          default: user
        is_blocked:
          type: boolean
          default: false
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        email: "john.doe@example.com"
        full_name: "John Doe"
        phone_number: "+919876543210"
        profile_picture_url: "https://example.com/profiles/johndoe.jpg"
        role: "user"
        is_blocked: false
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    Order:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: string
          format: uuid
        total_amount:
          type: number
          format: float
        status:
          type: string
          enum: [pending, processing, shipped, delivered, cancelled]
          default: pending
        shipping_address_id:
          type: integer
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        total_amount: 150.75
        status: "processing"
        shipping_address_id: 101
        created_at: "2023-03-10T14:30:00Z"
        updated_at: "2023-03-10T14:30:00Z"

    Banner:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
          default: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        image_url: "https://example.com/banners/banner1.jpg"
        target_url: "https://example.com/sale"
        title: "Summer Sale!"
        subtitle: "Up to 50% off everything"
        order: 1
        is_active: true
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    CreateBannerRequest:
      type: object
      required:
        - image_url
        - order
      properties:
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
          default: true
      example:
        image_url: "https://example.com/banners/new_banner.jpg"
        target_url: "https://example.com/new-collection"
        title: "New Arrivals"
        subtitle: "Check out our latest products"
        order: 2
        is_active: true

    UpdateBannerRequest:
      type: object
      properties:
        image_url:
          type: string
          format: uri
        target_url:
          type: string
          format: uri
          nullable: true
        title:
          type: string
          nullable: true
        subtitle:
          type: string
          nullable: true
        order:
          type: integer
          description: Display order of the banner
        is_active:
          type: boolean
      example:
        image_url: "https://example.com/banners/updated_banner.jpg"
        title: "Updated Sale!"
        order: 1
        is_active: false

    WatchAndShopVideo:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        title: "How to Style Your New Outfit"
        video_url: "https://www.youtube.com/watch?v=xxxxxxxx"
        description: "A guide to styling our latest collection."
        product_links:
          - product_id: 101
            timestamp: "00:15"
          - product_id: 102
            timestamp: "00:45"
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    CreateWatchAndShopVideoRequest:
      type: object
      required:
        - title
        - video_url
      properties:
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
      example:
        title: "New Product Showcase"
        video_url: "https://www.youtube.com/watch?v=yyyyyyyy"
        description: "Introducing our innovative new product."
        product_links:
          - product_id: 201
            timestamp: "01:00"

    UpdateWatchAndShopVideoRequest:
      type: object
      properties:
        title:
          type: string
        video_url:
          type: string
          format: uri
        description:
          type: string
          nullable: true
        product_links:
          type: array
          items:
            type: object
            properties:
              product_id:
                type: integer
              timestamp:
                type: string
                example: "00:30"
          nullable: true
      example:
        title: "Updated Styling Guide"
        video_url: "https://www.youtube.com/watch?v=zzzzzzzz"
        description: "Revised tips for styling your favorite pieces."
        product_links:
          - product_id: 101
            timestamp: "00:20"

    Affiliate:
      type: object
      properties:
        id:
          type: string
          format: uuid
          readOnly: true
        user_id:
          type: string
          format: uuid
          description: The user ID associated with this affiliate.
        referral_code:
          type: string
          description: Unique code for affiliate referrals.
        commission_rate:
          type: number
          format: float
          description: Commission rate for the affiliate (e.g., 0.10 for 10%).
        total_earnings:
          type: number
          format: float
          readOnly: true
          description: Total earnings accumulated by the affiliate.
        paid_earnings:
          type: number
          format: float
          readOnly: true
          description: Total earnings already paid out to the affiliate.
        pending_payout:
          type: number
          format: float
          readOnly: true
          description: Earnings pending payout to the affiliate.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: "affiliate-id-123"
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        referral_code: "AFFILIATE123"
        commission_rate: 0.10
        total_earnings: 500.75
        paid_earnings: 300.00
        pending_payout: 200.75
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    Coupon:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        code:
          type: string
          description: The coupon code.
        discount_type:
          type: string
          enum: [percentage, fixed_amount]
          description: Type of discount (percentage or fixed amount).
        discount_value:
          type: number
          format: float
          description: The value of the discount (e.g., 0.15 for 15% or 10.00 for $10).
        minimum_order_amount:
          type: number
          format: float
          nullable: true
          description: Minimum order amount required to apply the coupon.
        valid_from:
          type: string
          format: date-time
          description: Date and time from which the coupon is valid.
        valid_until:
          type: string
          format: date-time
          description: Date and time until which the coupon is valid.
        usage_limit:
          type: integer
          nullable: true
          description: Maximum number of times the coupon can be used overall.
        used_count:
          type: integer
          readOnly: true
          description: Number of times the coupon has been used.
        is_active:
          type: boolean
          description: Whether the coupon is currently active.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        code: "SUMMER20"
        discount_type: "percentage"
        discount_value: 0.20
        minimum_order_amount: 50.00
        valid_from: "2023-06-01T00:00:00Z"
        valid_until: "2023-08-31T23:59:59Z"
        usage_limit: 1000
        used_count: 150
        is_active: true
        created_at: "2023-05-20T10:00:00Z"
        updated_at: "2023-05-20T10:00:00Z"

    ApplyCouponRequest:
      type: object
      required:
        - code
        - userId
      properties:
        code:
          type: string
          description: The coupon code to apply.
          example: "DISCOUNT10"
        userId:
          type: string
          format: uuid
          description: The ID of the user applying the coupon.
          example: "a1b2c3d4-e5f6-7890-1234-567890abcdef"

    CouponApplicationResponse:
      type: object
      properties:
        discountAmount:
          type: number
          format: float
          description: The amount discounted by the coupon.
          example: 15.00
        newTotalAmount:
          type: number
          format: float
          description: The new total amount after applying the discount.
          example: 135.00
        couponId:
          type: integer
          description: The ID of the applied coupon.
          example: 1

    Notification:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        user_id:
          type: string
          format: uuid
          description: The ID of the user to whom the notification is sent.
        title:
          type: string
          description: Title of the notification.
        message:
          type: string
          description: Full message content of the notification.
        link_to:
          type: string
          format: uri
          nullable: true
          description: Optional URL the notification links to.
        is_read:
          type: boolean
          default: false
          description: Whether the user has read the notification.
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        user_id: "a1b2c3d4-e5f6-7890-1234-567890abcdef"
        title: "Order Shipped!"
        message: "Your order #12345 has been shipped and is on its way."
        link_to: "https://example.com/orders/12345"
        is_read: false
        created_at: "2023-07-20T14:00:00Z"
        updated_at: "2023-07-20T14:00:00Z"

    CreateNotificationRequest:
      type: object
      required:
        - userId
        - title
        - message
      properties:
        userId:
          type: string
          format: uuid
          description: The ID of the user to whom the notification is sent.
          example: "a1b2c3d4-e5f6-7890-1234-5677890abcdef"
        title:
          type: string
          description: Title of the notification.
          example: "Special Offer!"
        message:
          type: string
          description: Full message content of the notification.
          example: "Get 20% off your next purchase with code SAVE20."
        link_to:
          type: string
          format: uri
          nullable: true
          description: Optional URL the notification links to.
          example: "https://example.com/offers"

    Referral:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        referrer_user_id:
          type: string
          format: uuid
          description: The user ID of the referrer.
        referred_user_id:
          type: string
          format: uuid
          description: The user ID of the referred user.
        referral_code_used:
          type: string
          description: The referral code that was used.
        status:
          type: string
          enum: [pending, completed, cancelled]
          default: pending
          description: Status of the referral (e.g., pending, completed).
        created_at:
          type: string
          format: date-time
          readOnly: true
        updated_at:
          type: string
          format: date-time
          readOnly: true
      example:
        id: 1
        referrer_user_id: "uuid-referrer-123"
        referred_user_id: "uuid-referred-456"
        referral_code_used: "REFERRALXYZ"
        status: "pending"
        created_at: "2023-01-01T10:00:00Z"
        updated_at: "2023-01-01T10:00:00Z"

    RegisterWithReferralRequest:
      type: object
      required:
        - email
        - password
        - fullName
      properties:
        email:
          type: string
          format: email
          example: user@example.com
        password:
          type: string
          format: password
          example: strongpassword123
        fullName:
          type: string
          example: John Doe
        referralCode:
          type: string
          description: Optional referral code used during registration.
          example: "FREESHIP"

    otpLoginRequest:
      type: object
      required:
        - phone
        - otp
      properties:
        phone:
          type: string
          description: Phone number in E.164 format (e.g., +919876543210)
          example: "+919876543210"
        otp:
          type: string
          description: The OTP code sent to the user's phone
          example: "123456"
        fullName:
          type: string
          description: Optional full name to store in profiles table
          example: "John Doe"
        email:
          type: string
          format: email
          description: Optional email to update in auth.users
          example: "user@example.com"

    sendOtpRequest:
      type: object
      required:
        - phone
      properties:
        phone:
          type: string
          description: Phone number in E.164 format (e.g., +919876543210)
          example: "+919876543210"

    DealOfTheDay:
      type: object
      properties:
        id:
          type: integer
          format: int64
        product_variant_id:
          type: integer
          format: int64
        deal_price:
          type: number
          format: float
        deal_title:
          type: string
        is_active:
          type: boolean
        expires_at:
          type: string
          format: date-time
      example:
        id: 1
        product_variant_id: 101
        deal_price: 999.00
        deal_title: "Monsoon Special: 50% Off!"
        is_active: true
        expires_at: "2025-07-20T23:59:59Z"
    DealOfTheDayCreateRequest:
      type: object
      properties:
        variantId:
          type: integer
          format: int64
          example: 101
        dealPrice:
          type: number
          format: float
          example: 999.00
        dealTitle:
          type: string
          example: "Monsoon Special: 50% Off!"
        expiresAt:
          type: string
          format: date-time
          example: "2025-07-20T23:59:59Z"
      required: [variantId, dealPrice, dealTitle, expiresAt]
    DealOfTheDayUpdateRequest:
      type: object
      properties:
        dealPrice:
          type: number
          format: float
          example: 950.00
        expiresAt:
          type: string
          format: date-time
          example: "2025-07-21T23:59:59Z"

    ProductSearchResult:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        price:
          type: number
          format: float
        brand:
          type: string
        product_images:
          type: array
          items:
            $ref: '#/components/schemas/ProductImage'
      example:
        id: 1
        name: "Eco-Friendly Water Bottle"
        slug: "eco-friendly-water-bottle"
        description: "Stay hydrated with this sustainable water bottle."
        price: 19.99
        brand: "GreenLife"
        product_images:
          - image_url: "https://example.com/water-bottle.jpg"
            is_thumbnail: true

    RecommendedProduct:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        slug:
          type: string
        product_images:
          type: array
          items:
            type: object
            properties:
              image_url:
                type: string
                format: uri
              is_thumbnail:
                type: boolean
        product_variants:
          type: array
          items:
            type: object
            properties:
              price:
                type: number
                format: float
      example:
        id: 2
        name: "Organic Cotton T-Shirt"
        slug: "organic-cotton-t-shirt"
        product_images:
          - image_url: "https://example.com/t-shirt.jpg"
            is_thumbnail: true
        product_variants:
          - price: 25.00
            discount_type: "percentage"
            discount_value: 15

    CreateAddressRequest:
      type: object
      required:
        - address_line_1
        - city
        - state
        - pincode
        - country
        - full_name
        - phone_number
      properties:
        address_line_1:
          type: string
          example: 123 Main St
        address_line_2:
          type: string
          example: Apt 4B
          nullable: true
        city:
          type: string
          example: Someville
        state:
          type: string
          example: StateName
        pincode:
          type: string
          example: "123456"
        country:
          type: string
          example: India
        is_default:
          type: boolean
          example: true
          default: false
        full_name:
          type: string
          example: John Doe
        phone_number:
          type: string
          example: "+919876543210"

    UpdateAddressRequest:
      type: object
      properties:
        address_line_1:
          type: string
          example: 123 New St
        address_line_2:
          type: string
          example: Suite 1A
          nullable: true
        city:
          type: string
          example: Another Town
        state:
          type: string
          example: NewState
        pincode:
          type: string
          example: "654321"
        country:
          type: string
          example: India
        is_default:
          type: boolean
          example: false
        full_name:
          type: string
          example: Jane Doe
        phone_number:
          type: string
          example: "+919876543210"

    WishlistedProductIds:
      type: array
      items:
        type: integer
        format: int64
      description: An array of product IDs wishlisted by the user.
      example: [101, 205, 312]

    CartMergeItem:
      type: object
      description: Guest cart line item supplied for merge.
      properties:
        variantId:
          type: integer
          format: int64
          description: Identifier of the product variant stored in the guest cart.
        quantity:
          type: integer
          minimum: 1
          description: Quantity selected for that variant while browsing anonymously.
      required:
        - variantId
        - quantity
      example:
        variantId: 101
        quantity: 2

    CartMergeRequest:
      type: object
      required:
        - guestCart
      properties:
        guestCart:
          type: array
          description: Items collected while the user was browsing anonymously.
          items:
            $ref: '#/components/schemas/CartMergeItem'
      example:
        guestCart:
          - variantId: 101
            quantity: 1
          - variantId: 102
            quantity: 2

    StoryProfile:
      type: object
      description: Minimal profile details returned with story objects.
      properties:
        full_name:
          type: string
          nullable: true
          description: Full name of the user who created the story.
        profile_picture_url:
          type: string
          format: uri
          nullable: true
          description: Avatar image URL for the story author.

    StoryProduct:
      type: object
      description: Minimal product details returned with story objects.
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        slug:
          type: string

    Story:
      type: object
      description: Story record returned by story endpoints.
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
          nullable: true
        product_id:
          type: integer
          format: int64
          nullable: true
        media_url:
          type: string
          format: uri
        media_type:
          type: string
          enum:
            - image
            - video
        caption:
          type: string
          nullable: true
        status:
          type: string
          enum:
            - pending
            - approved
            - rejected
        posted_by_brand:
          type: boolean
        created_at:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
          nullable: true
        expires_at:
          type: string
          format: date-time
          nullable: true
        profiles:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StoryProfile'
        products:
          nullable: true
          allOf:
            - $ref: '#/components/schemas/StoryProduct'

    StorySubmissionRequest:
      type: object
      required:
        - productId
        - mediaUrl
        - mediaType
      properties:
        productId:
          type: integer
          format: int64
          description: Identifier of the product the story references.
        mediaUrl:
          type: string
          format: uri
          description: Public URL for the image or video asset.
        mediaType:
          type: string
          enum:
            - image
            - video
        caption:
          type: string
          nullable: true
      example:
        productId: 123
        mediaUrl: https://cdn.example.com/stories/abc.jpg
        mediaType: image
        caption: Loved the texture!

    BrandStoryCreateRequest:
      type: object
      required:
        - mediaUrl
        - mediaType
      properties:
        productId:
          type: integer
          format: int64
          nullable: true
          description: Optional product association for the story.
        mediaUrl:
          type: string
          format: uri
          description: Public URL for the image or video asset.
        mediaType:
          type: string
          enum:
            - image
            - video
        caption:
          type: string
          nullable: true
        expiryType:
          type: string
          nullable: true
          description: >
            Controls the expiry behaviour. Use `auto` to expire 24 hours after approval (default) or `manual`
            to keep the story active until it is manually removed.
          enum:
            - auto
            - manual
      example:
        productId: 456
        mediaUrl: https://cdn.example.com/stories/brand-launch.mp4
        mediaType: video
        caption: Celebrating our newest launch
        expiryType: auto

    AdminStoryApproveRequest:
      type: object
      properties:
        expiryType:
          type: string
          nullable: true
          description: >
            Controls the expiry behaviour. Use `auto` to expire 24 hours after approval (default) or `manual`
            to keep the story active until it is manually removed.
          enum:
            - auto
            - manual
      example:
        expiryType: manual

tags:
  - name: Auth
    description: User authentication and authorization
  - name: Homepage
    description: Aggregated content for the homepage
  - name: Products & Categories
    description: Product and Category related operations
  - name: User Profile & Addresses
    description: User profile and shipping address management
  - name: Wishlist
    description: User wishlist management
  - name: Cart
    description: User shopping cart management
  - name: Orders
    description: Order history and management
  - name: Reviews & Ratings
    description: Product reviews and ratings management
  - name: Stories
    description: User-generated stories and public story feed
  - name: Payment APIs
    description: Payment gateway integration endpoints
  - name: Admin APIs
    description: Admin panel management operations (requires admin role)
  - name: Admin User Management
    description: Management of user accounts by administrators
  - name: Admin Order Management
    description: Management of customer orders by administrators
  - name: Admin Review Management
    description: Management of product reviews by administrators
  - name: Admin Homepage Content Management
    description: Management of homepage banners and Watch & Shop videos
  - name: Affiliate APIs
    description: Affiliate program management endpoints
  - name: Coupon APIs
    description: Coupon management and application endpoints
  - name: Notifications
    description: User notification management
  - name: Referral APIs
    description: Referral program management endpoints
  - name: Deal of the Day
    description: Deal of the Day feature endpoints
  - name: Admin Stories
    description: Administrative moderation and brand story publishing
  - name: Products
    description: Product-related operations

paths:
  /api/reviews:
    post:
      summary: Create a product review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: Review created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - user hasn't purchased product
  /api/reviews/{id}:
    put:
      summary: Update an existing review
      tags:
        - Reviews
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewUpdate'
      responses:
        '200':
          description: Review updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReviewResponse'
        '400':
          description: Validation error
        '401':
          description: Unauthorized
        '403':
          description: Forbidden - user hasn't purchased product
  /auth/register:
    post:
      tags:
        - Auth
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterWithReferralRequest'
      responses:
        '201':
          description: User successfully registered
        '400':
          description: Invalid input
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in an existing user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                email:
                  type: string
                  format: email
                  example: user@example.com
                password:
                  type: string
                  format: password
                  example: strongpassword123
      responses:
        '200':
          description: User successfully logged in
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Logs out the currently authenticated user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully logged out
        '401':
          description: Unauthorized
  /auth/verify-token:
    get:
      tags:
        - Auth
      summary: Verifies if the provided Bearer token is valid
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Token is valid
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: Supabase auth user payload
        '401':
          description: Invalid or expired token / No token provided
        '500':
          description: Internal Server Error
  /auth/social-login:
    post:
      tags:
        - Auth
      summary: Initiates a social login flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                provider:
                  type: string
                  enum: [google, facebook]
                  example: google
      responses:
        '200':
          description: Social login initiated. Returns a redirect URL.
        '400':
          description: Invalid provider
  /auth/refresh-token:
    post:
      tags:
        - Auth
      summary: Refreshes an access token using a valid refresh token
      parameters:
        - in: header
          name: X-Refresh-Token
          required: false
          schema:
            type: string
          description: Optional. Provide refresh token via header instead of body. If provided, body is not required.
        - in: header
          name: Authorization
          required: false
          schema:
            type: string
            example: Bearer <refreshToken>
          description: Optional. You can also pass the refresh token as a Bearer token in the Authorization header for this endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - refreshToken
              properties:
                refreshToken:
                  type: string
                  example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
      responses:
        '200':
          description: Successfully refreshed session
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    description: The new session and tokens payload from Supabase
        '400':
          description: Missing refreshToken
        '401':
          description: Invalid or expired refresh token
        '500':
          description: Internal Server Error
  /homepage:
    get:
      tags:
        - Homepage
      summary: Fetches all aggregated content needed to render the main homepage
      responses:
        '200':
          description: Successfully fetched homepage data
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object
                    properties:
                      banners:
                        type: array
                        items:
                          type: object # Define banner schema if needed
                      watchAndShopVideos:
                        type: array
                        items:
                          type: object # Define video schema if needed
                      featuredProducts:
                        type: array
                        items:
                          type: object # Define product schema if needed
                      parentCategories:
                        type: array
                        items:
                          type: object # Define category schema if needed
        '500':
          description: Internal Server Error
  /products:
    get:
      tags:
        - Products & Categories
      summary: Lists all published products with filtering and pagination
      parameters:
        - in: query
          name: category
          schema:
            type: string
          description: Filter products by category ID
        - in: query
          name: sortBy
          schema:
            type: string
            enum:
              - price
              - created_at
              - bestselling
              - rating_desc
          description: Sorting field. Omit both sortBy and order for Featured sorting.
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
          description: Sort direction (required when sortBy=price or sortBy=created_at)
        - in: query
          name: page
          schema:
            type: integer
            format: int32
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            format: int32
            minimum: 1
            maximum: 100
            default: 10
          description: Number of items per page
        - in: query
          name: minPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Minimum price for filtering
        - in: query
          name: maxPrice
          schema:
            type: number
            format: float
            minimum: 0
          description: Maximum price for filtering
      responses:
        '200':
          description: Successfully retrieved products
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Detailed product schema can go here later
        '400':
          description: Invalid query parameters
        '500':
          description: Internal Server Error
  /products/{id}:
    get:
      tags:
        - Products & Categories
      summary: Get details of a single published product, including its variants and reviews
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: Numeric ID of the product to retrieve
      responses:
        '200':
          description: Successfully retrieved product details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    $ref: '#/components/schemas/ProductWithVariants' # Use new schema
        '404':
          description: Product not found or not published
        '500':
          description: Internal Server Error
  /products/search:
    get:
      tags:
        - Products & Categories
      summary: Searches for products based on a query string
      parameters:
        - in: query
          name: q
          schema:
            type: string
          required: true
          description: Search query string (e.g., product name, description, brand)
      responses:
        '200':
          description: A list of products matching the search query.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/ProductSearchResult'
        '400':
          $ref: '#/components/responses/BadRequest'
        '500':
          $ref: '#/components/responses/ServerError'
  /categories:
    get:
      tags:
        - Products & Categories
      summary: Lists all active categories and their sub-categories
      responses:
        '200':
          description: Successfully retrieved categories
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: array
                    items:
                      type: object # Category schema with sub_categories
        '500':
          description: Internal Server Error
  /user/profile:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets the profile of the currently logged-in user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Successfully retrieved user profile
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    example: true
                  data:
                    type: object # User profile schema
        '401':
          description: Unauthorized
  /auth/check-phone-exists:
    post:
      tags:
        - Auth
      summary: Checks if a phone number is already registered in Supabase auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - phone
              properties:
                phone:
                  type: string
                  example: "+919876543210"
      responses:
        '200':
          description: Phone existence check result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  exists:
                    type: boolean
        '400':
          description: Missing or invalid input
        '500':
          description: Internal Server Error
    put:
      tags:
        - User Profile & Addresses
      summary: Updates the profile of the currently logged-in user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fullName:
                  type: string
                  example: Jane Doe
                profilePictureUrl:
                  type: string
                  format: uri
                  example: https://example.com/profile.jpg
                dateOfBirth:
                  type: string
                  format: date
                  example: 1990-05-21
      responses:
        '200':
          description: User profile updated successfully
        '400':
          description: Invalid input
        '401':
          description: Unauthorized
        '404':
          description: User profile not found
        '500':
          description: Internal Server Error
  /user/addresses:
    get:
      tags:
        - User Profile & Addresses
      summary: Gets all saved addresses for the current user
      security:
